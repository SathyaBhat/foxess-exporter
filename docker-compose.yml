services:
  # ── FoxESS Exporter ──────────────────────────────────────────────────────
  foxess-exporter:
    build: .
    container_name: foxess-exporter
    restart: unless-stopped
    volumes:
      - ./config.yaml:/config.yaml:ro
    command: ["-config", "/config.yaml"]
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      # Environment variables override config.yaml values.
      # Uncomment and set these instead of (or alongside) config.yaml:
      # FOXESS_FOXESS_API_KEY: "YOUR_FOXESS_API_KEY"
      # FOXESS_FOXESS_DEVICE_SN: ""
      # FOXESS_INFLUXDB_HOST: "http://influxdb:8086"
      # FOXESS_INFLUXDB_TOKEN: "your-influxdb-token"
      # FOXESS_INFLUXDB_DATABASE: "foxess"
      # FOXESS_EXPORTER_REALTIME_INTERVAL: "60s"
      # FOXESS_LOG_LEVEL: "info"

  # ── InfluxDB v3 (Core OSS) ───────────────────────────────────────────────
  influxdb:
    image: influxdb:3-core
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb3
    environment:
      INFLUXDB3_NODE_ID: "foxess-node"
      INFLUXDB3_OBJECT_STORE: "file"
      INFLUXDB3_DB_DIR: "/var/lib/influxdb3"
    healthcheck:
      test: ["CMD", "influxdb3", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Passed through to the provisioning templates
      INFLUXDB_TOKEN: "${INFLUXDB_TOKEN:-your-influxdb-token}"

volumes:
  influxdb_data:
  grafana_data:
